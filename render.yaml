services:
  # BACKEND SERVICE (Node.js API)
  - type: web
    name: portfolio-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      # IMPORTANT: Set these in the Render Dashboard after deployment:
      # - MONGO_URI
      # - CLOUDINARY_CLOUD_NAME
      # - CLOUDINARY_API_KEY
      # - CLOUDINARY_API_SECRET
      # - EMAIL_USER
      # - EMAIL_PASS
      # - ADMIN_EMAIL
      # - ADMIN_DEFAULT_PASSWORD
      # - LEETCODE_USERNAME
      - key: CORS_ORIGIN
        value: "*" # Set this to your specific frontend URL in the dashboard later for max security

  # FRONTEND SERVICE (Static Site)
  - type: web
    name: portfolio-frontend
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: portfolio-api
          envVarKey: RENDER_EXTERNAL_URL
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
